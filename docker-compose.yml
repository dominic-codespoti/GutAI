services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports: ["5000:8080"]
    user: "${UID:-1000}:${GID:-1000}"
    restart: unless-stopped
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__AzureStorage=DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;TableEndpoint=http://azurite:10002/devstoreaccount1;
      - Jwt__Secret=local-dev-secret-key-that-is-at-least-32-characters-long!!
      - Jwt__Issuer=GutAI
      - Jwt__Audience=GutAI
      - Jwt__ExpiryMinutes=60
      - ExternalApis__UsdaApiKey=${USDA_API_KEY:-DEMO_KEY}
      - AzureOpenAI__Endpoint=https://openai-us-misc.openai.azure.com/
      - AzureOpenAI__DeploymentName=gpt-5-nano
      - AZURE_CONFIG_DIR=/azure-config
    volumes:
      - ${HOME}/.azure:/azure-config
    depends_on:
      azurite:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    develop:
      watch:
        - action: rebuild
          path: ./backend/src

  azurite:
    image: mcr.microsoft.com/azure-storage/azurite
    ports:
      - "10000:10000"
      - "10001:10001"
      - "10002:10002"
    volumes:
      - azurite-data:/data
    command: "azurite --blobHost 0.0.0.0 --queueHost 0.0.0.0 --tableHost 0.0.0.0 -l /data"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "nc", "-z", "127.0.0.1", "10002"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

volumes:
  azurite-data:
