name: Deploy Backend to Azure

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/gutai-api
  AZURE_RG: gutai-prod

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - run: dotnet test backend/ --verbosity minimal

  build-and-push:
    name: Build & Push to GHCR
    needs: test
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.meta.outputs.tags }}
      # We take the first tag (the sha one) as the one to deploy
      tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Lowercase image name
        id: lower
        run: echo "image_name=$(echo '${{ env.IMAGE_NAME }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ steps.lower.outputs.image_name }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest

      - uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}

  deploy-infra:
    name: Deploy Infrastructure
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: prod
    outputs:
      api-url: ${{ steps.deploy.outputs.apiUrl }}
    steps:
      - uses: actions/checkout@v4

      - name: Lowercase owner
        id: owner
        run: echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Ensure resource group
        run: |
          az group create \
            --name ${{ env.AZURE_RG }} \
            --location australiaeast \
            --tags project=gutai

      - name: Deploy Bicep
        id: deploy
        run: |
          # Use the exact image pushed in the previous job.
          # metadata-action's 'version' output is the primary tag (sha-<7-chars>).
          IMAGE_BASE="ghcr.io/${{ steps.owner.outputs.owner }}/gutai-api"
          TAG="${{ needs.build-and-push.outputs.tag }}"
          IMAGE="$IMAGE_BASE:$TAG"

          echo "Deploying image: $IMAGE"

          az deployment group create \
            --resource-group ${{ env.AZURE_RG }} \
            --template-file infra/main.bicep \
            --parameters \
              containerImage="$IMAGE" \
              jwtSecret='${{ secrets.JWT_SECRET }}' \
              usdaApiKey='${{ secrets.USDA_API_KEY }}' \
              ghcrUsername='${{ steps.owner.outputs.owner }}' \
              ghcrPassword='${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}'

          API_URL=$(az deployment group show \
            --resource-group ${{ env.AZURE_RG }} \
            --name main \
            --query properties.outputs.apiUrl.value -o tsv)
          echo "apiUrl=$API_URL" >> $GITHUB_OUTPUT

      - name: Print API URL
        run: echo "✅ API deployed to ${{ steps.deploy.outputs.apiUrl }}"

  smoke-test:
    name: Smoke Test
    needs: deploy-infra
    runs-on: ubuntu-latest
    steps:
      - name: Health check
        run: |
          URL="${{ needs.deploy-infra.outputs.api-url }}/health"
          echo "Checking $URL ..."
          for i in $(seq 1 12); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL" || true)
            if [ "$STATUS" = "200" ]; then
              echo "✅ Health check passed"
              exit 0
            fi
            echo "Attempt $i: status=$STATUS, retrying in 10s..."
            sleep 10
          done
          echo "❌ Health check failed after 2 minutes"
          exit 1
